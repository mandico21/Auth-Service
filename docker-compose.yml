version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pattern-service-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pattern_service_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pattern-service-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API__DEBUG: "true"
      API__INSTANCE_APP_NAME: pattern-service
      API__HOST: 0.0.0.0
      API__PORT: 8000
      API__WORKERS: 4
      API__REQUEST_TIMEOUT: 30

      POSTGRES__HOST: postgres
      POSTGRES__PORT: 5432
      POSTGRES__USER: postgres
      POSTGRES__PASSWORD: postgres
      POSTGRES__DATABASE_NAME: pattern_service_db
      POSTGRES__MIN_CONNECTION: 2
      POSTGRES__MAX_CONNECTION: 10
      POSTGRES__TIMEOUT: 5
      POSTGRES__STATEMENT_TIMEOUT: 25000
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
    command: >
      sh -c "python -m scripts.migrate &&
             uvicorn app.main:create_app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  prometheus:
    image: prom/prometheus:latest
    container_name: pattern-service-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docs/prometheus_rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: pattern-service-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: pattern-service-network

